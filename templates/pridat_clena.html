{% extends "_base.html" %}
{% block title %}Přidat člena – Knihovna{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm rounded-3">
      <div class="card-body p-4">
        <h2 class="h4 fw-bold mb-4" style="color:var(--brand)">
          <i class="bi bi-person-plus me-2"></i>Nový člen
        </h2>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Jméno</label>
            <input type="text" name="jmeno" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Příjmení</label>
            <input type="text" name="prijmeni" class="form-control" required />
          </div>
          <div class="mb-4">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control" required />
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success flex-grow-1">Přidat člena</button>
            <a href="{{ url_for('clenove') }}" class="btn btn-outline-secondary">Zrušit</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
