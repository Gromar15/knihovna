{% extends "_base.html" %}
{% block title %}Nová výpůjčka – Knihovna{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm rounded-3">
      <div class="card-body p-4">
        <h2 class="h4 fw-bold mb-4" style="color:var(--brand)">
          <i class="bi bi-arrow-right-circle me-2"></i>Nová výpůjčka
        </h2>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Kniha</label>
            <select name="book_id" class="form-select" required>
              <option value="">— vyberte knihu —</option>
              {% for k in dostupne_knihy %}
                <option value="{{ k.id }}">{{ k.nazev }} ({{ k.autor }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Čtenář</label>
            <select name="member_id" class="form-select" required>
              <option value="">— vyberte čtenáře —</option>
              {% for c in vsichni_clenove %}
                <option value="{{ c.id }}">{{ c.plne_jmeno }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label">Délka výpůjčky (dny)</label>
            <input type="number" name="dny" class="form-control" value="14" min="1" max="90" />
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success flex-grow-1">Vypůjčit</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Zrušit</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
