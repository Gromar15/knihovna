<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Knihovna{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark mb-4 shadow-sm">
  <div class="container">
    <a class="navbar-brand text-white" href="{{ url_for('index') }}">
      <i class="bi bi-book-half me-2"></i>Obecní knihovna
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navmenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
            <i class="bi bi-grid me-1"></i>Knihy
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint in ['clenove','pridat_clena'] %}active{% endif %}" href="{{ url_for('clenove') }}">
            <i class="bi bi-people me-1"></i>Členové
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'pujcky' %}active{% endif %}" href="{{ url_for('pujcky') }}">
            <i class="bi bi-arrow-left-right me-1"></i>Výpůjčky
          </a>
        </li>
        <li class="nav-item ms-md-3">
          <a class="btn btn-warning btn-sm fw-semibold px-3" href="{{ url_for('nova_pujcka') }}">
            <i class="bi bi-plus-lg me-1"></i>Nová výpůjčka
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show rounded-3">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
